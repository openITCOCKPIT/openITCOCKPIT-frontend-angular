<ng-container *transloco="let t">
    <nav aria-label="breadcrumb" class="mt-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a [routerLink]="['/']">
                    <fa-icon [icon]="['fas', 'home']"></fa-icon>
                    {{ t('Home') }}
                </a>
            </li>
            <li class="breadcrumb-item">
                <a *oitcPermission="['FilterbookmarkAllocations', 'index']"
                   [routerLink]="['/', 'FilterbookmarkAllocations', 'index']">
                    <fa-icon [icon]="['fas', 'table']"></fa-icon>
                    {{ t('Bookmark allocation') }}
                </a>
            </li>
            <li aria-current="page" class="breadcrumb-item active">
                <fa-icon [icon]="['fas', 'pen-to-square']"></fa-icon>
                {{ t('Edit') }}
            </li>
        </ol>
    </nav>
    <oitc-form-loader [isVisible]="!post"></oitc-form-loader>
    @if (post) {
        <form cForm (ngSubmit)="submit()" autocomplete="off">
            <c-card class="mb-3">
                <c-card-header>
                    <h5 cCardTitle>{{ t('Edit Bookmark allocation') }}:
                        <small class="fw-300">
                            {{ post.name }}
                        </small>
                    </h5>
                    <c-nav class="card-toolbar card-header-pills">
                        <c-nav-item class="px-1">
                            <button [fallbackUrl]="['FilterbookmarkAllocations', 'index']" cButton class="ripple"
                                    color="default"
                                    oitcBackButton
                                    size="xs">
                                <fa-icon [icon]="['fas', 'left-long']"></fa-icon>
                                {{ t('Back') }}
                            </button>
                        </c-nav-item>
                    </c-nav>
                </c-card-header>
                <c-card-body>
                    <div class="mb-3">
                        <label cLabel for="container">
                            {{ t('Container') }}
                        </label>
                        <oitc-select
                            name="container"
                            id="container"
                            optionValue="key"
                            optionLabel="value"
                            [options]="containers"
                            [(ngModel)]="this.post.container_id"
                            [debounce]="true"
                            (onChange)="onContainerChange()"
                            oitcFormError [errors]="errors" errorField="container_id"
                            [disabled]="true">
                        </oitc-select>
                        @if (!this.post.container_id) {
                            <div class="text-warning-glow pt-1">
                                {{ t('Please select a container.') }}
                            </div>
                        }
                        <oitc-form-feedback [errors]="errors" errorField="container_id"></oitc-form-feedback>
                    </div>
                    <div class="mb-3">
                        <label cLabel for="BookmarkSelect">
                            {{ t('Bookmark to allocate') }}
                        </label>
                        <oitc-select
                            name="BookmarkSelect"
                            id="BookmarkSelect"
                            optionValue="key"
                            optionLabel="value"
                            [options]="filter_bookmarks"
                            [(ngModel)]="post.filter_bookmark_id"
                            (onChange)="onBookmarkChange()"
                            [disabled]="true"
                            >
                        </oitc-select>
                        <oitc-form-feedback [errors]="errors"
                                            errorField="filter_bookmark_id"></oitc-form-feedback>
                    </div>
                    <div class="mb-3">
                        <label cLabel for="UsersSelect">
                            {{ t('Allocated Users') }}
                            <oitc-required-icon></oitc-required-icon>
                        </label>
                        <oitc-multi-select
                            name="UsersSelect"
                            id="UsersSelect"
                            optionValue="key"
                            optionLabel="value"
                            [appendTo]="''"
                            [(ngModel)]="post.users._ids"
                            [options]="users">
                        </oitc-multi-select>
                    </div>
                    <div class="mb-3">
                        <label cLabel for="UserrolesSelect">
                            {{ t('Allocated User roles') }}
                            <oitc-required-icon></oitc-required-icon>
                        </label>
                        <oitc-multi-select
                            name="UserrolesSelect"
                            id="UserrolesSelect"
                            optionValue="key"
                            optionLabel="value"
                            [appendTo]="''"
                            [(ngModel)]="post.usergroups._ids"
                            [options]="usergroups">
                        </oitc-multi-select>
                    </div>
                </c-card-body>
                <c-card-footer class="text-end">
                    <button cButton color="primary" type="submit" class="ripple">
                        {{ t('Update allocation') }}
                    </button>
                    <button [fallbackUrl]="['FilterbookmarkAllocations', 'index']" cButton class="ms-1 ripple"
                            color="default"
                            oitcBackButton
                            type="button">
                        {{ t('Cancel') }}
                    </button>
                </c-card-footer>
            </c-card>
        </form>
    }
</ng-container>
