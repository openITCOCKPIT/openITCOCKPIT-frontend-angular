<ng-container *transloco="let t">
    <nav aria-label="breadcrumb" class="mt-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a [routerLink]="['/']">
                    <fa-icon [icon]="['fas', 'home']"></fa-icon>
                    {{ t('Home') }}
                </a></li>
            <li class="breadcrumb-item">
                <a *oitcPermission="['usergroups', 'index']"
                   [routerLink]="['/', 'usergroups', 'index']">
                    <fa-icon [icon]="['fas', 'users']"></fa-icon>
                    {{ t('User container roles') }}
                </a>
            </li>
            <li aria-current="page" class="breadcrumb-item active">
                <fa-icon [icon]="['fas', 'chain']"></fa-icon>
                {{ t('Append LDAP groups to user roles') }}
            </li>
        </ol>
    </nav>

    <form cForm (ngSubmit)="submit()">
        <c-card class="mb-3">
            <c-card-header>
                <h5 cCardTitle>
                    {{ t('Append LDAP groups') }}
                    <small class="fw-300">
                        {{ t('to user roles') }}
                    </small>
                </h5>

                <c-nav class="card-toolbar card-header-pills">
                    <c-nav-item class="px-1">
                        <button [fallbackUrl]="['ldapgroups', 'index']" cButton class="ripple" color="default"
                                oitcBackButton
                                size="xs">
                            <fa-icon [icon]="['fas', 'left-long']"></fa-icon>
                            {{ t('Back') }}
                        </button>
                    </c-nav-item>
                </c-nav>

            </c-card-header>
            <c-card-body>

                <div class="mb-3">
                    <label cLabel for="post.Usergroup.id">
                        {{ t('User role') }}
                        <oitc-required-icon></oitc-required-icon>
                    </label>
                    <oitc-select
                        name="post.Usergroup.id"
                        id="post.Usergroup.id"
                        [(ngModel)]="post.Usergroup.id"
                        optionValue="key"
                        optionLabel="value"
                        [options]="usergroups"
                        oitcFormError [errors]="errors" errorField="usergroup_id">
                    </oitc-select>
                    <oitc-form-feedback [errors]="errors"
                                        errorField="usergroup_id"></oitc-form-feedback>
                </div>

            </c-card-body>
            <c-card-footer class="text-end">

                <button cButton class="ripple" color="primary" type="submit">
                    {{ t('Append LDAP group to user role') }}
                </button>
                <button [fallbackUrl]="['usergroups', 'index']" cButton class="ms-1 ripple" color="default"
                        oitcBackButton
                        type="button">
                    {{ t('Cancel') }}
                </button>


            </c-card-footer>
        </c-card>
    </form>
</ng-container>
