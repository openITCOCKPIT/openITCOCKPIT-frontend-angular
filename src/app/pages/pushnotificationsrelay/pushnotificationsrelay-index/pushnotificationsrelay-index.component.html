<ng-container *transloco="let t">
    <nav aria-label="breadcrumb" class="mt-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item">
                <a [routerLink]="['/']">
                    <fa-icon [icon]="['fas', 'home']"></fa-icon>
                    {{ t('Home') }}
                </a></li>
            <li class="breadcrumb-item">
                <a *oitcPermission="['notificationsrelay', 'index']" [routerLink]="['/', 'pushnotificationsrelay', 'index']">
                    <fa-icon [icon]="['fas', 'globe']"></fa-icon>
                    {{ t('Push-Notifications Relay') }}
                </a>
            </li>
            <li aria-current="page" class="breadcrumb-item active">
                <fa-icon [icon]="['fas', 'wrench']"></fa-icon>
                {{ t('Configuration') }}
            </li>
        </ol>
    </nav>

    <oitc-form-loader [isVisible]="isLoading"/>

    @if (!isLoading) {
        <form cForm (ngSubmit)="submit()">
            <c-card class="mb-3">
                <c-card-header>
                    <h5 cCardTitle>
                        {{ t('Relay for mobile push ntifications') }}
                        <small class="fw-300">
                            {{ t('Edit configuration') }}
                        </small>
                    </h5>
                </c-card-header>
                <c-card-body>
                    <div class="row">
                        <div class="col-12">
                            <div class="mb-3">
                                <label cLabel for="address">
                                    {{ t('Relay address') }}
                                    <oitc-required-icon></oitc-required-icon>
                                </label>
                                <input cFormControl id="address" required type="text"
                                       name="address"
                                       placeholder="relay.example.org"
                                       oitcFormError [errors]="errors" errorField="address"
                                       [(ngModel)]="post.address">
                                <oitc-form-feedback [errors]="errors" errorField="address"></oitc-form-feedback>
                            </div>
                            <div class="mb-3">
                                <div>
                                <label cLabel for="authkey">
                                    {{ t('Auth-Key') }}
                                    <oitc-required-icon></oitc-required-icon>
                                </label>
                                <input cFormControl id="authkey" required type="text"
                                       name="authkey"
                                       oitcFormError [errors]="errors" errorField="auth_key"
                                       [(ngModel)]="post.auth_key">
                                <oitc-form-feedback [errors]="errors" errorField="auth_key"></oitc-form-feedback>
                                </div>
                                <button
                                        cButton
                                        class="ripple"
                                        color="success"
                                        size="xs"
                                        (click)="createAuth()">
                                    <fa-icon [icon]="['fas', 'plus']"></fa-icon>
                                    {{ t('New auth key') }}
                                </button>
                                <div>

                                </div>
                            </div>
                            <div class="mb-3">
                                <label cLabel for="port">
                                    {{ t('Port') }}
                                    <oitc-required-icon></oitc-required-icon>
                                </label>
                                <input cFormControl id="port" required type="number"
                                       name="port"
                                       min="1"
                                       max="65535"
                                       placeholder="8080"
                                       oitcFormError [errors]="errors" errorField="port"
                                       [(ngModel)]="post.port">
                                <oitc-form-feedback [errors]="errors" errorField="port"></oitc-form-feedback>
                            </div>
                            <div class="mb-3">
                                <c-form-check>
                                    <input
                                            cFormCheckInput
                                            name="enabled"
                                            id="enabled"
                                            type="checkbox"
                                            oitcFormError [errors]="errors" errorField="enabled"
                                            [(ngModel)]="post.enabled"/>
                                    <label cFormCheckLabel for="enabled">
                                        {{ t('Enable proxy') }}
                                    </label>
                                </c-form-check>
                                <oitc-form-feedback [errors]="errors" errorField="enabled"></oitc-form-feedback>
                                <div class="help-block">
                                    {{ t('If disabled no push-notifcations to mobile') }}
                                </div>
                            </div>
                        </div>
                    </div>
                </c-card-body>
                <c-card-footer class="text-end">
                    <button cButton class="ripple" color="primary" type="submit">
                        {{ t('Save configuration') }}
                    </button>
                    <button [fallbackUrl]="['dashboards', 'index']" cButton class="ms-1 ripple" color="default"
                            oitcBackButton
                            type="button">
                        {{ t('Cancel') }}
                    </button>
                </c-card-footer>
            </c-card>
        </form>
    }

</ng-container>
