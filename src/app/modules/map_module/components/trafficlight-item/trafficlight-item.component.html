@if (allowView) {
    @if (!isViewMode()) {
        <div cdkDrag #container class="map-element-container"
             (cdkDragEnded)="onDragEnd($event)"
             (cdkDragMoved)="onDragMove($event)"
             cdkDragBoundary=".map-canvas">
            <div cdkDragHandle [id]="'map-trafficlight-' + item()?.id" [style.width.px]="width+10"
                 ngResizable
                 #traffic
                 (rzStart)="onResizeStart(container)"
                 (rzResizing)="onResizing(traffic)"
                 (rzStop)="onResizeStop({ width: $event.size.width, height: $event.size.height }, type)"
                 [rzAspectRatio]="true"
                 [rzHandles]="'se'"
                 [style.height.px]="height+10">
            </div>
        </div>
        @if (!isViewMode()) {
            <p-contextMenu [target]="container" [model]="contextMenuItems"
                           appendTo="body"></p-contextMenu>
        }
    } @else {
        <div #container class="map-element-container cursor-normal"
             [ngClass]="{'cursor-pointer': enablePointerCursor()}">
            <div [id]="'map-trafficlight-' + item()?.id" [style.width.px]="width + 10"
                 [style.height.px]="height + 10">
            </div>
        </div>
    }
}
