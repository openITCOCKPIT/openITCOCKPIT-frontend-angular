@if (!isViewMode()) {
    <div cdkDrag #container class="map-element-container"
         (cdkDragEnded)="onDragEnd($event)"
         (cdkDragMoved)="onDragMove($event)"
         cdkDragBoundary=".map-canvas">
        <div cdkDragHandle
             ngResizable
             [id]="'map-cylinder-' + item()!.id"
             (rzStart)="onResizeStart(container)"
             (rzResizing)="onResizing(perfdataText)"
             (rzStop)="onResizeStop({ width: $event.size.width, height: $event.size.height }, type)"
             [rzAspectRatio]="false"
             [rzHandles]="'se'"
             [ngStyle]="{'width.px': width + 10, 'height.px': height + 10}">
            <svg cdkDragHandle viewBox="0 0 85 18"
                 #perfdataText
                 [attr.width]="width" [attr.height]="height"
                 id="map-perfdatatext-{{item()!.id}}">
                <text x="0" y="15" [attr.fill]="color">
                    {{ text }}
                </text>
            </svg>
        </div>
    </div>
    @if (!isViewMode()) {
        <p-contextMenu [target]="container" [model]="contextMenuItems"
                       appendTo="body"></p-contextMenu>
    }
} @else {
    <div #container class="map-element-container cursor-normal" [ngClass]="{'cursor-pointer': enablePointerCursor()}">
        <svg viewBox="0 0 85 18" [attr.width]="width" [attr.height]="height"
             id="map-perfdatatext-{{item()!.id}}">
            <text x="0" y="15" [attr.fill]="color">
                {{ text }}
            </text>
        </svg>
    </div>
}
