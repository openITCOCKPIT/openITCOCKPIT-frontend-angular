@if (!isViewMode()) {
    <div cdkDrag #container class="map-element-container"
         (cdkDragEnded)="onDragEnd($event)"
         (cdkDragMoved)="onDragMove($event)"
         cdkDragBoundary=".map-canvas">
        @if (allowView) {
            <div cdkDragHandle
                 ngResizable
                 #serviceOutput
                 (rzStart)="onResizeStart(container)"
                 (rzResizing)="onResizing(serviceOutput)"
                 (rzStop)="onResizeStop({ width: $event.size.width, height: $event.size.height }, type)"
                 [rzAspectRatio]="false"
                 [rzHandles]="'se'"
                 [ngStyle]="{'width.px': width +10, 'height.px': height +10, 'font-size.px': item()!.font_size}">
                <span [hidden]="!item()!.show_label" class="bold">
                    {{ Service.hostname }} / {{ Service.servicename }}:
                </span>
                <span [ngClass]="color" [innerHTML]="output | trustAsHtml"></span>
            </div>
        }
    </div>
    @if (!isViewMode()) {
        <p-contextMenu [target]="container" [model]="contextMenuItems"
                       appendTo="body"></p-contextMenu>
    }
} @else {
    <div #container class="map-element-container cursor-normal" [ngClass]="{'cursor-pointer': enablePointerCursor()}">
        @if (allowView) {
            <div
                [ngStyle]="{'width.px': width, 'height.px': height, 'font-size.px': item()!.font_size}">
                <span [hidden]="!item()!.show_label" class="bold">
                    {{ Service.hostname }} / {{ Service.servicename }}:
                </span>
                <span [ngClass]="color" [innerHTML]="output | trustAsHtml"></span>
            </div>
        }
    </div>
}
