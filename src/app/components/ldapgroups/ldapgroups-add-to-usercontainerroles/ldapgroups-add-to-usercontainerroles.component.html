<ng-container *transloco="let t">
    <c-modal
        #modal='cModal'
        [keyboard]="true"
        id="ldapgroupAddToUsercontainerrolesModal"
        size="lg"
    >
        <c-modal-header class="text-bg-gray bg-primary text-white">
            <h5 cModalTitle>
                <fa-icon [icon]="['fas', 'chain']"></fa-icon>
                {{ t('Add LDAP group/s to user container role') }}
            </h5>
            <button (click)="hideModal()" cButtonClose></button>
        </c-modal-header>
        <c-modal-body>
            {{ t('Selected LDAP group') }}
            <ul>
                @for (item of items; track item) {
                    <li>{{ item.value }}</li>
                }
            </ul>
        </c-modal-body>
        <c-modal-footer>
            <button [disabled]="isSend" cButton class="ripple" color="success"
                    [routerLink]="['/', 'usercontainerroles', 'add', joinedLdapgroupsIds]">
                {{ t('Create new user container role') }}
            </button>
            <button [disabled]="isSend" cButton class="ripple" color="primary"
                    [routerLink]="['/', 'usercontainerroles', 'append', joinedLdapgroupsIds]">
                {{ t('Append existing user container role') }}
            </button>
            <button (click)="hideModal()" cButton class="ripple" color="default">
                {{ t('Cancel') }}
            </button>
        </c-modal-footer>
    </c-modal>
</ng-container>
